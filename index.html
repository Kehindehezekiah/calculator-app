<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div id="calculator">
      <div id="display">
        <div id="expression"></div>
        <div id="result">0</div>
      </div>

      <div id="buttons">
        <button class="light">C</button>
        <button class="light">⌫</button>
        <button class="light">%</button>
        <button class="operator">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>0</button>
        <button>.</button>
        <button class="equals">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
